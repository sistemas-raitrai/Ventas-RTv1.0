<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Seguimiento de Grupos | Sistema Ventas RT</title>

  <link rel="stylesheet" href="estilos.css" />
  <link rel="icon" type="image/png" href="IMG/logo-raitrai.png" />

<style>
  .seguimiento-page{
    padding:18px 30px 30px;
  }

  .seguimiento-panel-main{
    background:#efefef;
    border:3px dashed var(--line);
    padding:20px 22px;
  }

  .seguimiento-topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }

  .seguimiento-title-wrap h2{
    margin:0 0 6px;
    font-size:30px;
    color:var(--header);
  }

  .seguimiento-title-wrap p{
    margin:0;
    color:#5a5862;
    font-size:14px;
  }

.seguimiento-toolbar{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  margin-bottom:18px;
}

.toolbar-left{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:10px;
  align-items:end;
  width:100%;
}

.toolbar-right{
  display:grid;
  grid-template-columns:minmax(0, 1fr) auto;
  gap:10px;
  align-items:end;
  width:100%;
  margin-left:0;
}

.field-wrap{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}

.field-wrap label{
  font-size:13px;
  font-weight:700;
  color:var(--header);
}

.seguimiento-toolbar input[type="text"],
.seguimiento-toolbar select{
  width:100%;
  min-width:0;
  height:42px;
  border:2px solid var(--line);
  border-radius:8px;
  padding:0 12px;
  font-size:14px;
  background:#fff;
  color:var(--header);
}

.field-wrap.search-wide{
  min-width:0;
}

.field-wrap.search-wide input{
  width:100%;
  min-width:0;
}

.toggle-wrap{
  min-width:0;
  width:100%;
}

.toggle-box{
  width:100%;
  min-width:0;
  height:42px;
  border:2px solid var(--line);
  border-radius:8px;
  background:#fff;
  padding:0 10px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:var(--header);
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  white-space:nowrap;
}

.toggle-box input{
  width:16px;
  height:16px;
  margin:0;
  accent-color:var(--header);
}

.btn-page{
  min-width:150px;
  height:44px;
  border:none;
  border-radius:8px;
  background:var(--header);
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  padding:0 16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

.btn-page.sec{
  background:#6b6178;
}

.seguimiento-actions{
  display:flex;
  gap:10px;
  align-items:end;
  justify-content:flex-end;
  flex-wrap:nowrap;
}

  .seguimiento-summary{
    display:grid;
    grid-template-columns:repeat(7, minmax(120px, 1fr));
    gap:12px;
    margin-bottom:18px;
  }

  .seguimiento-summary-card{
    background:#fff;
    border:2px solid #d7dde6;
    border-radius:12px;
    padding:14px 16px;
    min-height:86px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .seguimiento-summary-card .label{
    font-size:12px;
    font-weight:800;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:#6d6480;
    margin-bottom:6px;
  }

  .seguimiento-summary-card .value{
    font-size:30px;
    font-weight:800;
    color:var(--header);
    line-height:1;
  }

  .seguimiento-table-card{
    background:#fff;
    border:2px solid #d7dde6;
    border-radius:12px;
    overflow:hidden;
  }

  .seguimiento-legend{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    padding:14px 16px;
    border-bottom:1px solid #e5e7eb;
    background:#fff;
  }

  .seguimiento-legend-item{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:#534a63;
    font-size:13px;
    font-weight:700;
  }

  .seguimiento-legend-bar{
    display:flex;
    gap:4px;
  }

  .seguimiento-legend-bar span,
  .seg-step{
    width:18px;
    height:8px;
    border-radius:999px;
    background:#d9d9df;
    display:inline-block;
  }

  .seg-fill-red{ background:#ff4a41 !important; }
  .seg-fill-orange{ background:#ff6b00 !important; }
  .seg-fill-yellow{ background:#f1a929 !important; }
  .seg-fill-mix{ background:linear-gradient(90deg, #f1a929 0%, #118a2f 100%) !important; }
  .seg-fill-green{ background:#118a2f !important; }

  .seg-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:26px;
    padding:0 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:800;
    white-space:nowrap;
  }

  .seg-badge-blue{
    background:#dbeafe;
    color:#1d4ed8;
  }

  .seg-badge-green-dark{
    background:#dcfce7;
    color:#166534;
  }

  .seg-badge-muted{
    background:#e5e7eb;
    color:#475569;
  }

  .seguimiento-table-wrap{
    width:100%;
    overflow:auto;
  }

  .seguimiento-table{
    width:max-content;
    min-width:100%;
    border-collapse:collapse;
  }

  .seguimiento-table thead th{
    position:sticky;
    top:0;
    background:var(--header);
    color:#fff;
    text-align:left;
    padding:12px 10px;
    font-size:13px;
    letter-spacing:.2px;
    z-index:1;
    white-space:nowrap;
    text-transform:uppercase;
  }

  .seguimiento-table tbody td{
    border-bottom:1px solid #e5e7eb;
    padding:12px 10px;
    font-size:14px;
    vertical-align:middle;
    color:#2f2b3a;
    white-space:nowrap;
    background:#fff;
  }

  .seguimiento-table tbody tr:hover td{
    background:#faf8fd;
  }

  .seg-group{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:280px;
  }

  .seg-avatar{
    width:42px;
    height:42px;
    border-radius:12px;
    overflow:hidden;
    flex:0 0 42px;
    background:linear-gradient(135deg, rgba(47,111,219,.10), rgba(17,138,47,.10));
    border:1px solid #d7dde6;
    display:grid;
    place-items:center;
    color:var(--header);
    font-weight:800;
    font-size:14px;
  }

  .seg-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .seg-group-info{
    min-width:0;
  }

  .seg-group-title{
    font-size:15px;
    font-weight:800;
    color:var(--header);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:340px;
  }

  .seg-group-sub{
    margin-top:4px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    color:#6d6480;
    font-size:12px;
  }

  .seg-chip-vendor{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:24px;
    padding:0 9px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    background:#ecfeff;
    color:#0f766e;
  }

  .seg-destino{
    min-width:180px;
    font-weight:700;
    color:#394150;
  }

  .seg-progress-wrap{
    display:flex;
    flex-direction:column;
    gap:8px;
    min-width:220px;
  }

  .seg-progress-bar{
    display:flex;
    gap:6px;
  }

  .seg-progress-label{
    font-size:12px;
    font-weight:700;
    color:#5b536d;
  }

  .seg-date{
    white-space:nowrap;
    color:#394150;
    font-size:14px;
  }

  .seg-date small{
    display:block;
    margin-top:3px;
    color:#7b748a;
    font-size:12px;
  }

  .seg-docs{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    min-width:210px;
  }

  .seg-doc{
    width:30px;
    height:30px;
    border-radius:10px;
    display:grid;
    place-items:center;
    border:1px solid rgba(15,23,42,.06);
    font-size:14px;
    font-weight:800;
    cursor:default;
    user-select:none;
  }

  .seg-doc-ok{
    background:#dcfce7;
    color:#166534;
  }

  .seg-doc-pendiente{
    background:#fef3c7;
    color:#a16207;
  }

  .seg-doc-no-aplica{
    background:#fee2e2;
    color:#b91c1c;
  }

  .seg-doc-default{
    background:#e5e7eb;
    color:#475569;
  }

  .seg-empty{
    padding:28px 16px !important;
    text-align:center;
    color:#666;
    font-weight:700;
  }

  .seguimiento-actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  }
  
  .summary-filter{
    border:2px solid #d7dde6;
    border-radius:12px;
    background:#fff;
    text-align:left;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease, border-color .15s ease;
  }
  
  .summary-filter:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 18px rgba(36,18,56,.08);
  }
  
  .summary-filter.is-active{
    border-color:rgba(58,42,82,.24);
  }
  
  .summary-filter.is-off{
    opacity:.42;
  }
  
  .summary-filter .label,
  .summary-filter .value{
    pointer-events:none;
  }
  
  .th-sort{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    border:none;
    background:transparent;
    color:#fff;
    padding:0;
    font:inherit;
    font-weight:700;
    cursor:pointer;
    text-transform:uppercase;
  }
  
  .th-sort .sort-arrow{
    font-size:12px;
    opacity:.8;
    flex:0 0 auto;
  }
  
  .th-sort.active .sort-arrow{
    opacity:1;
  }
  
  .col-vendedor,
  .td-vendedor{
    white-space:nowrap;
  }
  
  .td-vendedor{
    font-weight:700;
    color:#4b5563;
  }
  
  body.is-vendedor-view .col-vendedor,
  body.is-vendedor-view .td-vendedor{
    display:none;
  }

@media (max-width: 1280px){
  .toolbar-left{
    grid-template-columns:repeat(4, minmax(0, 1fr));
  }

  .toolbar-right{
    grid-template-columns:minmax(0, 1fr) auto;
  }

  .seguimiento-summary{
    grid-template-columns:repeat(4, minmax(120px, 1fr));
  }
}

@media (max-width: 980px){
  .toolbar-left{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }

  .toolbar-right{
    grid-template-columns:minmax(0, 1fr) auto;
  }
}

@media (max-width: 760px){
  .seguimiento-page{
    padding:16px;
  }

  .toolbar-left,
  .toolbar-right{
    grid-template-columns:1fr;
  }

  .seguimiento-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    width:100%;
  }

  .toggle-box,
  .btn-page{
    width:100%;
    min-width:0;
  }

  .seguimiento-summary{
    grid-template-columns:repeat(2, minmax(120px, 1fr));
  }
}

@media (max-width: 520px){
  .seguimiento-actions{
    grid-template-columns:1fr;
  }

  .seguimiento-summary{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body class="ventas-body" data-page="seguimiento">
  <div id="layout-top"></div>

<main class="page-shell seguimiento-page">
  <section class="page-card panel seguimiento-panel-main">

    <div class="page-header seguimiento-topbar">
      <div class="page-title-wrap seguimiento-title-wrap">
        <h2>Seguimiento de grupos</h2>
        <p>Vista general del avance comercial de grupos y cotizaciones.</p>
      </div>
    </div>

    <div class="page-toolbar seguimiento-toolbar">
      <div class="toolbar-left">
        <div class="field-wrap">
          <label for="filtroAno">Año</label>
          <select id="filtroAno">
            <option value="todos">Todos</option>
          </select>
        </div>

        <div class="field-wrap">
          <label for="filtroEstado">Estado</label>
          <select id="filtroEstado">
            <option value="todos">Todos</option>
            <option value="a_contactar">A contactar</option>
            <option value="contactado">Contactado</option>
            <option value="cotizando">Cotizando</option>
            <option value="recotizando">Recotizando</option>
            <option value="reunion_confirmada">Reunión confirmada</option>
            <option value="ganada">Ganada</option>
            <option value="perdida">Perdida</option>
          </select>
        </div>

        <div class="field-wrap">
          <label for="filtroVendedora">Vendedor(a)</label>
          <select id="filtroVendedora">
            <option value="todos">Todos</option>
          </select>
        </div>

        <div class="field-wrap toggle-wrap">
          <label for="toggleAnteriores">Mostrar</label>
          <label class="toggle-box" for="toggleAnteriores">
            <input id="toggleAnteriores" type="checkbox" />
            <span>Archivados</span>
          </label>
        </div>
      </div>

      <div class="toolbar-right">
        <div class="field-wrap search-wide">
          <label for="buscadorSeguimiento">Buscar</label>
          <input
            id="buscadorSeguimiento"
            type="text"
            placeholder="Alias, apoderado, grupo, colegio, destino..."
            autocomplete="off"
          />
        </div>
        
        <div class="seguimiento-actions">
          <button id="btnExportarSeguimiento" class="btn-page sec" type="button">
            Exportar XLSX
          </button>
      
          <button id="btnRecargarSeguimiento" class="btn-page" type="button">
            Recargar
          </button>
        </div>
      </div>
    </div>

    <section class="seguimiento-summary" id="seguimientoSummaryFilters">
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="__all__">
        <div class="label">Total</div>
        <div class="value" id="sumTotal">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="a_contactar">
        <div class="label">A contactar</div>
        <div class="value" id="sumAContactar">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="contactado">
        <div class="label">Contactado</div>
        <div class="value" id="sumContactado">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="cotizando">
        <div class="label">Cotizando</div>
        <div class="value" id="sumCotizando">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="reunion_confirmada">
        <div class="label">Reunión</div>
        <div class="value" id="sumReunion">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-active" data-summary-state="ganada">
        <div class="label">Ganadas</div>
        <div class="value" id="sumGanadas">0</div>
      </button>
    
      <button type="button" class="seguimiento-summary-card summary-filter is-off" data-summary-state="perdida">
        <div class="label">Perdidas</div>
        <div class="value" id="sumPerdidas">0</div>
      </button>
    </section>

    <div class="table-wrap seguimiento-table-card">
      <div class="seguimiento-legend">
        <div class="seguimiento-legend-item">
          <span class="seguimiento-legend-bar">
            <span class="seg-fill-red"></span><span></span><span></span><span></span><span></span>
          </span>
          A contactar
        </div>

        <div class="seguimiento-legend-item">
          <span class="seguimiento-legend-bar">
            <span class="seg-fill-orange"></span><span class="seg-fill-orange"></span><span></span><span></span><span></span>
          </span>
          Contactado
        </div>

        <div class="seguimiento-legend-item">
          <span class="seguimiento-legend-bar">
            <span class="seg-fill-yellow"></span><span class="seg-fill-yellow"></span><span class="seg-fill-yellow"></span><span></span><span></span>
          </span>
          Cotizando / Recotizando
        </div>

        <div class="seguimiento-legend-item">
          <span class="seguimiento-legend-bar">
            <span class="seg-fill-mix"></span><span class="seg-fill-mix"></span><span class="seg-fill-mix"></span><span class="seg-fill-mix"></span><span></span>
          </span>
          Reunión confirmada
        </div>

        <div class="seguimiento-legend-item">
          <span class="seguimiento-legend-bar">
            <span class="seg-fill-green"></span><span class="seg-fill-green"></span><span class="seg-fill-green"></span><span class="seg-fill-green"></span><span class="seg-fill-green"></span>
          </span>
          Ganada
        </div>

        <div class="seguimiento-legend-item">
          <span class="seg-badge seg-badge-blue">Autorizada</span>
        </div>

        <div class="seguimiento-legend-item">
          <span class="seg-badge seg-badge-green-dark">Cerrada</span>
        </div>
      </div>

      <div class="seguimiento-table-wrap">
        <table class="seguimiento-table">
          <thead>
            <tr>
              <th>
                <button type="button" class="th-sort" data-sort="grupo">
                  <span>Grupo</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th class="col-vendedor">
                <button type="button" class="th-sort active" data-sort="vendedora" data-default-sort="1">
                  <span>Vendedor(a)</span>
                  <span class="sort-arrow">↑</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="destino">
                  <span>Destino</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="estado">
                  <span>Progreso</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="autorizada">
                  <span>Aut.</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="cerrada">
                  <span>Cerr.</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="ultimaGestion">
                  <span>Últ. gestión</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="ultimaReunion">
                  <span>Últ. reunión</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
          
              <th>
                <button type="button" class="th-sort" data-sort="documentos">
                  <span>Documentos / hitos</span>
                  <span class="sort-arrow">↕</span>
                </button>
              </th>
            </tr>
          </thead>
          <tbody id="tbodySeguimiento">
            <tr>
              <td colspan="9" class="seg-empty">Cargando grupos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </section>
</main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script type="module" src="layout.js"></script>
  <script type="module" src="seguimiento.js"></script>
</body>
</html>
