<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asignación Comercial | Sistema Ventas RT</title>
  <link rel="stylesheet" href="estilos.css" />
  <link rel="icon" type="image/png" href="IMG/logo-raitrai.png" />
</head>
<body class="ventas-body" data-page="asignados">

  <div id="layout-top"></div>

  <main class="page-shell asignados-page">
    <section class="page-card panel asignados-panel-main">
  
      <div class="page-header asignados-topbar">
        <div class="asignados-title-wrap">
          <h2>Asignación comercial</h2>
          <p id="asignadosScope">Grupos sin vendedor(a) asignado.</p>
        </div>
  
        <div class="asignados-top-actions">
          <button id="btnRecargar" class="btn-page" type="button">Recargar</button>
        </div>
      </div>
  
      <div class="asignados-toolbar">
        <div class="toolbar-left">
          <div class="field-wrap search-wide">
            <label for="searchInput">Buscar</label>
            <input
              id="searchInput"
              type="text"
              placeholder="Buscar por ID, alias, colegio, cliente..."
              autocomplete="off"
            />
          </div>
  
          <div class="field-wrap">
            <label for="filterVendedora">Vendedor(a)</label>
            <select id="filterVendedora">
              <option value="">Todas las vendedoras</option>
            </select>
          </div>
  
          <div class="field-wrap">
            <label for="filterAnoViaje">Año</label>
            <select id="filterAnoViaje">
              <option value="">Todos los años</option>
            </select>
          </div>
  
          <div class="field-wrap">
            <label for="filterEstado">Estado</label>
            <select id="filterEstado">
              <option value="">Todos los estados</option>
            </select>
          </div>
        </div>
  
        <div class="toolbar-right">
          <div class="field-wrap">
            <label>Vista</label>
            <div class="asignados-tabs">
              <button id="btnTabSinAsignar" class="scope-tab active" type="button">Sin asignar</button>
              <button id="btnTabAsignados" class="scope-tab" type="button">Asignados</button>
            </div>
          </div>
  
          <div class="field-wrap">
            <label>Resumen</label>
            <div id="tableSummary" class="asignados-summary-inline">0 registro(s) en esta vista</div>
          </div>
        </div>
      </div>
  
      <div class="asignados-table-card">
        <div class="asignados-table-wrap">
          <table class="asignados-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Alias / Grupo</th>
                <th>Colegio</th>
                <th>Comuna/Ciudad</th>
                <th>Año</th>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Vendedor(a) actual</th>
                <th>Asignar a</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyAsignados"></tbody>
          </table>
        </div>
      </div>
  
      <div id="emptyState" class="asignados-empty hidden">
        No hay registros para esta vista.
      </div>
  
    </section>
  </main>
  
  <div id="historyModal" class="simple-modal">
    <div class="simple-modal-card">
      <div class="simple-modal-head">
        <h3 id="historyTitle">Historial de asignación</h3>
        <button id="historyCloseBtn" type="button" class="modal-close-btn">✕</button>
      </div>
  
      <div id="historyBody" class="history-body"></div>
  
      <div class="simple-modal-actions">
        <button id="historyCloseBtn2" type="button" class="btn-page sec">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- MODAL HISTORIAL -->
  <div id="historyModal" class="simple-modal">
    <div class="simple-modal-card">
      <div class="simple-modal-head">
        <h3 id="historyTitle">Historial de asignación</h3>
        <button id="historyCloseBtn" type="button" class="modal-close-btn">✕</button>
      </div>

      <div id="historyBody" class="history-body"></div>

      <div class="simple-modal-actions">
        <button id="historyCloseBtn2" type="button" class="btn-secondary">Cerrar</button>
      </div>
    </div>
  </div>

  <script type="module" src="layout.js"></script>
  <script type="module" src="asignados.js"></script>
</body>
</html>
